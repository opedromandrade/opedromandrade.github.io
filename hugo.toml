baseURL = "https://opedromandrade.github.io/"
languageCode = "en-us"
title = "pedro andrade"
theme="archie"
copyright = "pedro"
# Code Highlight
pygmentsstyle = "monokai"
pygmentscodefences = true
pygmentscodefencesguesssyntax = true

[pagination]
  pagerSize = 6 # articles per page

[params]
	mode="toggle" # color-mode → light,dark,toggle or auto
	useCDN=false # don't use CDNs for fonts and icons, instead serve them locally.
	#subtitle = "Minimal and Clean [blog theme for Hugo](https://github.com/athul/archie)"
	#mathjax = true # enable MathJax support
	#katex = true # enable KaTeX support
	 favicon = "favicon.svg"

# Social Tags

[[params.social]]
name = "GitHub"
icon = "github"
url = "https://github.com/opedromandrade"

[[params.social]]
name = "LinkedIn"
icon = "linkedin"
url = "https://www.linkedin.com/in/opedromandrade/"

[[params.social]]
name = "Twitter"
icon = "twitter"
url = "https://twitter.com"

